# SearXNG settings
#
# Conservative allowlist: keep only engines backed by official/public APIs or
# public data services that are suitable for automated access in commercial use.
# HTML-scraping engines are intentionally excluded.

use_default_settings:
  engines:
    keep_only:
      - wikipedia
      - wikidata
      - wikibooks
      - wikinews
      - wikiquote
      - wikisource
      - wikiversity
      - wikivoyage
      - wiktionary
      - wikicommons.images
      - wikicommons.videos
      - wikicommons.audio
      - wikicommons.files
      - arxiv
      - pubmed
      - library of congress
      - crossref
      - github
      - github code
      - gitlab
      - stackoverflow
      - askubuntu
      - superuser

general:
  debug: false
  instance_name: "SearXNG"

search:
  safe_search: 2
  autocomplete: ""
  favicon_resolver: ""
  formats:
    - html

server:
  # Is overwritten by ${SEARXNG_SECRET}
  secret_key: "ultrasecretkey"
  limiter: true
  image_proxy: true
  # public URL of the instance, to ensure correct inbound links. Is overwritten
  # by ${SEARXNG_BASE_URL}.
  # base_url: http://example.com/location

valkey:
  # URL to connect valkey database. Is overwritten by ${SEARXNG_VALKEY_URL}.
  url: valkey://localhost:6379/0

outgoing:
  # Set an identifying suffix with contact info if you plan sustained API usage.
  # Example: " admin@example.com"
  useragent_suffix: ""

engines:
  - name: wikibooks
    disabled: false

  - name: wikiquote
    disabled: false

  - name: wikisource
    disabled: false

  - name: wikiversity
    disabled: false

  - name: wikivoyage
    disabled: false

  - name: library of congress
    disabled: false

  - name: crossref
    disabled: false

  - name: gitlab
    disabled: false
    # SearXNG has no per-engine requests/second setting in YAML.
    # Use a single connection and no retries to reduce request bursts.
    max_connections: 1
    max_keepalive_connections: 1
    retries: 0

  - name: github code
    inactive: false
    max_connections: 1
    max_keepalive_connections: 1
    retries: 0

  - name: github
    max_connections: 1
    max_keepalive_connections: 1
    retries: 0

  - name: stackoverflow
    max_connections: 1
    max_keepalive_connections: 1
    retries: 0

  - name: askubuntu
    max_connections: 1
    max_keepalive_connections: 1
    retries: 0

  - name: superuser
    max_connections: 1
    max_keepalive_connections: 1
    retries: 0
